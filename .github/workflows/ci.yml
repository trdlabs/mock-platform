name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # No --ignore-scripts here on purpose. pnpm-workspace.yaml records the build decision
      # (allowBuilds: esbuild: true), so a plain install succeeds — and if that decision is ever
      # lost again, this step is what fails. Suppressing scripts would hide exactly that drift:
      # pnpm reacts to an unrecorded decision by REWRITING pnpm-workspace.yaml with a
      # "set this to true or false" placeholder, which is how the broken file got committed.
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm verify:no-forbidden-deps
      - run: pnpm verify:no-secrets
      - run: pnpm verify:sdk-pin
      # The golden gate only ever ran in the local `check:ci` chain, never here. Its HARD half
      # (vendored golden matches its recorded sha256) works fine on a runner; the cross-repo half
      # WARN-skips without a platform checkout, which is its documented behaviour.
      - run: pnpm verify:golden-sync
      - run: pnpm verify:fixtures

  fetch-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # The tool imports mock src/ (that is the documented boundary — only its npm DEPS are kept out
      # of the root lockfile), and src/contract/ops-read reaches the SDK seam through its barrel,
      # so typechecking it needs the ROOT dependencies present. Locally this is invisible: module
      # resolution walks up into the repo's own node_modules.
      - run: pnpm install --frozen-lockfile
      - working-directory: tools/fetch-snapshot
        # --ignore-scripts IS still needed here, for a reason the root job does not have:
        # --ignore-workspace makes pnpm skip pnpm-workspace.yaml entirely, so this package's
        # allowBuilds is never read and the install would fail on ignored builds (verified).
        # --ignore-workspace itself stays: it is what keeps the tool's pg/hyparquet resolution
        # from ever being influenced by the repo root. esbuild's prebuilt binary is enough for
        # vitest/tsc, so nothing is lost by not building it.
        run: |
          pnpm install --ignore-workspace --frozen-lockfile --ignore-scripts
          pnpm typecheck
          pnpm exec vitest run

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t trading-mock-platform:ci .
      # The committed WFO fixture is tens of MB and must never be baked into the image — only
      # data/snapshots/fixtures is. Building alone proved nothing here, so assert it: a COPY-scope
      # or .dockerignore change that ships it now fails CI instead of silently inflating the image.
      # Asserted directly rather than via `if docker run ...`, which would have been fail-open: a
      # container that failed to start for any other reason reads as "the path isn't there" and the
      # gate passes. Here the exit code IS the assertion, so a broken run fails the job too.
      - name: assert the WFO fixture is absent from the image
        run: |
          docker run --rm --entrypoint sh trading-mock-platform:ci \
            -c 'test ! -e /app/data/snapshots/wfo'
