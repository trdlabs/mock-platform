name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # --ignore-scripts: esbuild's prebuilt binary (an optional dep) is enough for vitest/tsc;
      # pnpm 11 otherwise exits non-zero on its "ignored build scripts" policy. Deterministic + safe.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm check
      - run: pnpm verify:no-forbidden-deps
      - run: pnpm verify:no-secrets

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t trading-mock-platform:ci .
