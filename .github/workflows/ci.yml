name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # --ignore-scripts: esbuild's prebuilt binary (an optional dep) is enough for vitest/tsc;
      # pnpm 11 otherwise exits non-zero on its "ignored build scripts" policy. Deterministic + safe.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm check
      - run: pnpm verify:no-forbidden-deps
      - run: pnpm verify:no-secrets
      - run: pnpm verify:sdk-pin
      # The golden gate only ever ran in the local `check:ci` chain, never here. Its HARD half
      # (vendored golden matches its recorded sha256) works fine on a runner; the cross-repo half
      # WARN-skips without a platform checkout, which is its documented behaviour.
      - run: pnpm verify:golden-sync

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t trading-mock-platform:ci .
